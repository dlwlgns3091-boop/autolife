<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>마케팅 데스크</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card2: #263245;
  --border: #334155;
  --accent: #8b5cf6;
  --accent-dim: #7c3aed;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --danger: #ef4444;
  --success: #10b981;
  --warning: #f59e0b;
  --radius: 12px;
  --tab-h: 62px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  min-height: 100dvh;
  padding-bottom: calc(var(--tab-h) + 8px);
}
.app { max-width: 640px; margin: 0 auto; padding: 16px 14px; }
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.page-header h1 { font-size: 20px; font-weight: 700; }
.section { display: none; }
.section.active { display: block; }

/* ── Bottom tab bar ─────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  overflow-x: auto; overflow-y: hidden;
  z-index: 100;
  scrollbar-width: none;
}
.bottom-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1 0 auto;
  min-width: 64px;
  padding: 6px 4px 4px;
  border: none; background: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border-top: 2px solid transparent;
  transition: color .15s;
  white-space: nowrap;
}
.tab-btn .ico { font-size: 18px; line-height: 1; }
.tab-btn.active { color: var(--accent); border-top-color: var(--accent); }

/* ── Cards ──────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-dim); text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 10px;
}

/* ── Progress bar ───────────────────────────────────────────── */
.prog-wrap { margin-bottom: 14px; }
.prog-label {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--text-dim); margin-bottom: 5px;
}
.prog-bar {
  height: 6px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.prog-fill {
  height: 100%; background: var(--accent);
  border-radius: 3px; transition: width .3s;
}

/* ── Check items ────────────────────────────────────────────── */
.check-list { display: flex; flex-direction: column; gap: 0; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.check-item:last-child { border-bottom: none; }
.check-circle {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin-top: 1px; flex-shrink: 0;
  background: none;
}
.check-circle:hover { border-color: var(--success); }
.check-circle.checked { background: var(--success); border-color: var(--success); }
.check-circle.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
.check-body { flex: 1; min-width: 0; }
.check-title { font-weight: 500; font-size: 14px; word-break: break-word; line-height: 1.4; }
.check-title.done { text-decoration: line-through; color: var(--text-dim); }
.check-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn {
  border: none; background: none; cursor: pointer;
  color: var(--text-dim); font-size: 15px; padding: 3px;
  border-radius: 6px; line-height: 1;
}
.icon-btn:hover { color: var(--text); background: var(--card2); }
.icon-btn.del:hover { color: var(--danger); }

/* ── Add item row ───────────────────────────────────────────── */
.add-row {
  display: flex; gap: 8px; margin-top: 12px;
}
.add-row input {
  flex: 1; background: var(--card2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  padding: 8px 12px; outline: none;
}
.add-row input:focus { border-color: var(--accent); }
.add-row input::placeholder { color: var(--text-dim); }
.btn {
  padding: 8px 14px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 600;
  transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary {
  background: var(--card2); color: var(--text-dim);
  border: 1px solid var(--border); font-size: 12px; padding: 7px 12px;
}
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── Dashboard ──────────────────────────────────────────────── */
.dash-hero {
  background: linear-gradient(135deg, #4c1d95, var(--accent));
  border-radius: var(--radius);
  padding: 16px; margin-bottom: 14px;
  color: #fff;
}
.dash-hero-date { font-size: 13px; opacity: .8; margin-bottom: 4px; }
.dash-hero-period {
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
}
.period-badge {
  font-size: 11px; padding: 2px 8px;
  border-radius: 20px; border: 1px solid rgba(255,255,255,.4);
  font-weight: 600;
}
.dash-limit-row {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 8px; margin-bottom: 12px; font-size: 13px; color: var(--text-dim);
}
.dash-limit-row select {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); padding: 3px 8px;
  font-size: 13px;
}
.prog-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 14px;
}
.prog-mini {
  background: var(--card2); border-radius: 10px;
  padding: 10px 12px; border: 1px solid var(--border);
}
.prog-mini-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.prog-mini-nums {
  font-size: 13px; font-weight: 600;
  display: flex; justify-content: space-between; margin-bottom: 5px;
}
.dash-items { display: flex; flex-direction: column; gap: 8px; }
.dash-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.dash-item.urgent { border-left: 3px solid var(--danger); }
.dash-item-type {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  padding: 2px 6px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
  letter-spacing: .03em;
}
.type-daily { background: #1e3a5f; color: #60a5fa; }
.type-month_start { background: #2d1b69; color: #a78bfa; }
.type-month_end { background: #451a03; color: #fbbf24; }
.type-weekly { background: #052e16; color: #4ade80; }
.type-always { background: #3b1515; color: #f87171; }
.dash-item-title { flex: 1; font-size: 14px; line-height: 1.4; }
.dash-empty {
  text-align: center; padding: 32px 16px;
  color: var(--text-dim); font-size: 14px;
}

/* ── Calendar ───────────────────────────────────────────────── */
.cal-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-bottom: 14px;
}
.cal-nav span { font-size: 16px; font-weight: 700; min-width: 120px; text-align: center; }
.cal-nav button {
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); border-radius: 8px; padding: 6px 12px;
  cursor: pointer; font-size: 16px;
}
.cal-nav button:hover { border-color: var(--accent); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--text-dim); padding: 6px 2px;
}
.cal-dow:first-child { color: #f87171; }
.cal-dow:last-child { color: #60a5fa; }
.cal-day {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding-top: 5px; cursor: pointer;
  font-size: 13px; font-weight: 500;
  position: relative; transition: background .12s;
  border: 1px solid transparent;
}
.cal-day:hover { background: var(--card2); border-color: var(--border); }
.cal-day.today { border-color: var(--accent); color: var(--accent); font-weight: 700; }
.cal-day.other-month { opacity: .35; }
.cal-day.period-ms { background: rgba(139,92,246,.12); }
.cal-day.period-me { background: rgba(245,158,11,.1); }
.cal-day.period-weekly { background: rgba(16,185,129,.1); }
.cal-day .dot-wrap {
  display: flex; gap: 2px; flex-wrap: wrap;
  justify-content: center; margin-top: 2px; padding: 0 2px;
}
.cal-day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.cal-day-num { line-height: 1; }
.cal-legend {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-top: 12px; font-size: 11px; color: var(--text-dim);
}
.cal-legend-item { display: flex; align-items: center; gap: 5px; }
.cal-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

/* ── Hospital grid ──────────────────────────────────────────── */
.hosp-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 6px;
}
.hosp-item {
  display: flex; align-items: center; gap: 7px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 10px; cursor: pointer;
  transition: border-color .15s;
}
.hosp-item:hover { border-color: var(--accent); }
.hosp-item.checked { border-color: var(--success); background: rgba(16,185,129,.08); }
.hosp-circle {
  width: 16px; height: 16px; min-width: 16px;
  border-radius: 50%; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.hosp-item.checked .hosp-circle { background: var(--success); border-color: var(--success); }
.hosp-item.checked .hosp-circle::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; }
.hosp-name { font-size: 12px; line-height: 1.3; word-break: break-all; }

/* ── Always tasks ───────────────────────────────────────────── */
.task-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
}
.task-item.urgent { border-left: 3px solid var(--danger); }
.task-header { display: flex; align-items: flex-start; gap: 8px; }
.task-title { flex: 1; font-weight: 600; font-size: 14px; word-break: break-word; }
.task-title.done-text { text-decoration: line-through; color: var(--text-dim); }
.task-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; align-items: center; }
.badge {
  font-size: 11px; padding: 2px 7px;
  border-radius: 20px; font-weight: 600;
}
.badge-p1 { background: #1e3a5f; color: #93c5fd; }
.badge-p2 { background: #1c3b2e; color: #6ee7b7; }
.badge-p3 { background: #2a2a2a; color: var(--text-dim); }
.badge-p4 { background: #3b2b00; color: #fcd34d; }
.badge-p5 { background: #3b1515; color: #fca5a5; }
.badge-pending { background: var(--card); color: var(--text-dim); }
.badge-in_progress { background: #1c2f4a; color: #60a5fa; }
.badge-done { background: #0f2e1e; color: #4ade80; }
.badge-deadline { background: var(--card); color: var(--text-dim); }
.badge-deadline.urgent { background: #3b1515; color: #fca5a5; }
.task-memo { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
.task-actions { display: flex; gap: 5px; flex-shrink: 0; }

/* ── Modals ─────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; padding: 16px;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  width: 100%; max-width: 400px; max-height: 90vh;
  overflow-y: auto;
}
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 5px; }
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%; background: var(--card2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px;
  padding: 8px 12px; outline: none; font-family: inherit;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.cal-event-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.cal-event-item {
  background: var(--card2); border-radius: 8px;
  padding: 9px 12px; display: flex; align-items: center; gap: 8px;
}
.cal-event-item-title { flex: 1; font-size: 13px; }
.cal-event-item-memo { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.bulk-hint { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.always-top-actions { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="app">

  <!-- ── Dashboard ───────────────────────────────────────── -->
  <section id="section-dashboard" class="section active">
    <div id="dash-hero"></div>
    <div class="dash-limit-row">
      표시 개수:
      <select id="limit-select" onchange="onLimitChange(this.value)">
        <option value="1">1개</option>
        <option value="3">3개</option>
        <option value="5" selected>5개</option>
        <option value="0">전체</option>
      </select>
    </div>
    <div id="dash-prog-grid" class="prog-grid"></div>
    <div id="dash-items" class="dash-items"></div>
  </section>

  <!-- ── Calendar ────────────────────────────────────────── -->
  <section id="section-calendar" class="section">
    <div class="page-header"><h1>캘린더</h1></div>
    <div class="cal-nav">
      <button onclick="calPrev()">‹</button>
      <span id="cal-month-label"></span>
      <button onclick="calNext()">›</button>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <div class="cal-legend">
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(139,92,246,.4)"></div>월초집중(1~5일)</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(245,158,11,.4)"></div>월말집중(25일~)</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:rgba(16,185,129,.4)"></div>주간점검(월)</div>
      <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--accent);border-radius:50%"></div>일정 있음</div>
    </div>
  </section>

  <!-- ── Daily ───────────────────────────────────────────── -->
  <section id="section-daily" class="section">
    <div class="page-header">
      <h1>매일</h1>
      <button class="btn btn-secondary" onclick="resetDaily()">새 날 시작</button>
    </div>
    <div id="daily-prog" class="prog-wrap"></div>
    <div class="card">
      <div id="daily-list" class="check-list"></div>
      <div class="add-row">
        <input id="daily-input" placeholder="새 항목 추가..." onkeydown="if(event.key==='Enter')addDailyItem()">
        <button class="btn btn-primary" onclick="addDailyItem()">+</button>
      </div>
    </div>
  </section>

  <!-- ── Month Start ─────────────────────────────────────── -->
  <section id="section-month-start" class="section">
    <div class="page-header">
      <h1>월초 (1~5일)</h1>
      <button class="btn btn-secondary" onclick="resetMonthStart()">새 달 시작</button>
    </div>
    <div class="card">
      <div class="card-title">기본 체크리스트</div>
      <div id="ms-prog" class="prog-wrap"></div>
      <div id="ms-task-list" class="check-list"></div>
      <div class="add-row">
        <input id="ms-input" placeholder="새 항목 추가..." onkeydown="if(event.key==='Enter')addMsTask()">
        <button class="btn btn-primary" onclick="addMsTask()">+</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">카페침투 대상 (6곳)</div>
      <div id="ms-cafe-prog" class="prog-wrap"></div>
      <div id="ms-cafe-list" class="hosp-grid"></div>
    </div>
    <div class="card">
      <div class="card-title">구글리뷰 대상 (21곳)</div>
      <div id="ms-review-prog" class="prog-wrap"></div>
      <div id="ms-review-list" class="hosp-grid"></div>
    </div>
  </section>

  <!-- ── Month End ──────────────────────────────────────── -->
  <section id="section-month-end" class="section">
    <div class="page-header">
      <h1>월말 (25일~)</h1>
      <button class="btn btn-secondary" onclick="resetMonthEnd()">새 달 시작</button>
    </div>
    <div class="card">
      <div id="me-prog" class="prog-wrap"></div>
      <div id="me-list" class="check-list"></div>
      <div class="add-row">
        <input id="me-input" placeholder="새 항목 추가..." onkeydown="if(event.key==='Enter')addMeItem()">
        <button class="btn btn-primary" onclick="addMeItem()">+</button>
      </div>
    </div>
  </section>

  <!-- ── Weekly ──────────────────────────────────────────── -->
  <section id="section-weekly" class="section">
    <div class="page-header">
      <h1>주간</h1>
      <button class="btn btn-secondary" onclick="resetWeekly()">새 주 시작</button>
    </div>
    <div class="card">
      <div id="weekly-prog" class="prog-wrap"></div>
      <div id="weekly-list" class="check-list"></div>
      <div class="add-row">
        <input id="weekly-input" placeholder="새 항목 추가..." onkeydown="if(event.key==='Enter')addWeeklyItem()">
        <button class="btn btn-primary" onclick="addWeeklyItem()">+</button>
      </div>
    </div>
  </section>

  <!-- ── Always On ──────────────────────────────────────── -->
  <section id="section-always" class="section">
    <div class="page-header">
      <h1>상시</h1>
      <button class="btn btn-primary btn-sm" onclick="openAlwaysModal()">+ 추가</button>
    </div>
    <div class="always-top-actions">
      <button class="btn btn-secondary" onclick="openBulkModal()">일괄 등록</button>
      <button class="btn btn-secondary" onclick="copyForAI()">AI용 양식 복사</button>
    </div>
    <div id="always-list"></div>
  </section>

</div><!-- .app -->

<!-- ── Bottom Nav ─────────────────────────────────────────── -->
<nav class="bottom-nav">
  <button class="tab-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
    <span class="ico">📊</span><span>대시보드</span>
  </button>
  <button class="tab-btn" data-tab="calendar" onclick="showTab('calendar')">
    <span class="ico">📅</span><span>캘린더</span>
  </button>
  <button class="tab-btn" data-tab="daily" onclick="showTab('daily')">
    <span class="ico">✅</span><span>매일</span>
  </button>
  <button class="tab-btn" data-tab="month-start" onclick="showTab('month-start')">
    <span class="ico">📝</span><span>월초</span>
  </button>
  <button class="tab-btn" data-tab="month-end" onclick="showTab('month-end')">
    <span class="ico">📋</span><span>월말</span>
  </button>
  <button class="tab-btn" data-tab="weekly" onclick="showTab('weekly')">
    <span class="ico">🔍</span><span>주간</span>
  </button>
  <button class="tab-btn" data-tab="always" onclick="showTab('always')">
    <span class="ico">⚡</span><span>상시</span>
  </button>
</nav>

<!-- ── Calendar Date Modal ────────────────────────────────── -->
<div id="cal-modal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="cal-modal-title">일정</h2>
    <div id="cal-event-list" class="cal-event-list"></div>
    <div class="form-group">
      <label>제목</label>
      <input id="cal-ev-title" placeholder="일정 제목">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="cal-ev-memo" placeholder="메모 (선택)"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeCalModal()">닫기</button>
      <button class="btn btn-primary" onclick="saveCalEvent()">추가</button>
    </div>
  </div>
</div>

<!-- ── Always Task Modal ──────────────────────────────────── -->
<div id="always-modal" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="always-modal-title">할 일 추가</h2>
    <input type="hidden" id="always-edit-id">
    <div class="form-group">
      <label>제목</label>
      <input id="always-title-input" placeholder="제목">
    </div>
    <div class="form-group">
      <label>우선순위 (1~5)</label>
      <select id="always-priority-input">
        <option value="5">5 (최고)</option>
        <option value="4">4 (높음)</option>
        <option value="3" selected>3 (보통)</option>
        <option value="2">2 (낮음)</option>
        <option value="1">1 (최저)</option>
      </select>
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="always-status-input">
        <option value="pending">대기</option>
        <option value="in_progress">진행중</option>
        <option value="done">완료</option>
      </select>
    </div>
    <div class="form-group">
      <label>마감일</label>
      <input type="date" id="always-deadline-input">
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="always-memo-input" placeholder="메모 (선택)"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeAlwaysModal()">취소</button>
      <button class="btn btn-primary" onclick="saveAlwaysTask()">저장</button>
    </div>
  </div>
</div>

<!-- ── Bulk Import Modal ──────────────────────────────────── -->
<div id="bulk-modal" class="modal-overlay hidden">
  <div class="modal">
    <h2>일괄 등록</h2>
    <p class="bulk-hint">형식: 제목 | 우선순위(1-5) | 마감(YYYY-MM-DD) | 메모<br>한 줄에 한 항목. 우선순위/마감/메모 생략 가능.</p>
    <div class="form-group">
      <textarea id="bulk-text" placeholder="업무A | 5 | 2026-07-01 | 메모&#10;업무B | 3" style="min-height:140px"></textarea>
    </div>
    <div id="bulk-preview" style="font-size:12px;color:var(--text-dim);margin-bottom:10px"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeBulkModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmBulk()">등록</button>
    </div>
  </div>
</div>

<!-- ── Edit Checklist Item Modal ──────────────────────────── -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal">
    <h2>항목 수정</h2>
    <input type="hidden" id="edit-type">
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label>제목</label>
      <input id="edit-title-input" placeholder="제목">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEditItem()">저장</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
