<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마케팅 데스크</title><style>
:root{--primary:#7c3aed;--primary-light:#8b5cf6;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
.app{max-width:620px;margin:0 auto;padding:16px 12px 90px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header h1{font-size:20px;font-weight:700}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.bottom-nav button{flex:1;padding:10px 4px 6px;border:none;background:none;cursor:pointer;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px}
.bottom-nav button .ico{font-size:20px}
.bottom-nav button.active{color:var(--primary);font-weight:700}
.section{display:none}.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.progress-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-circle{width:22px;height:22px;min-width:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;flex-shrink:0}
.check-circle:hover{border-color:var(--success)}
.check-circle.checked{background:var(--success);border-color:var(--success)}
.check-circle.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.check-body{flex:1;min-width:0}
.check-title{font-weight:500;font-size:14px;word-break:break-word}
.check-title.done-text{text-decoration:line-through;color:var(--muted)}
.check-memo{font-size:12px;color:var(--muted);margin-top:3px}
.check-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{border:none;background:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px}
.icon-btn:hover{color:var(--text)}.icon-btn.del:hover{color:var(--danger)}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-body{flex:1;min-width:0}
.task-title{font-weight:600;font-size:14px;word-break:break-word}
.task-title.urgent{color:var(--danger)}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;align-items:center}
.badge{font-size:11px;padding:2px 7px;border-radius:10px}
.badge-p{background:#ede9fe;color:var(--primary)}
.badge-dl{background:#fee2e2;color:var(--danger)}
.badge-dl.ok{background:#f1f5f9;color:var(--muted)}
.badge-st{background:#dcfce7;color:#16a34a}
.badge-st.pending{background:#f1f5f9;color:var(--muted)}
.badge-st.ip{background:#fef9c3;color:#92400e}
.task-actions{display:flex;gap:6px;flex-shrink:0}
.dash-hero{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px}
.dash-hero-top{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.count-btns{display:flex;gap:4px}
.count-btn{padding:2px 8px;border:1px solid rgba(255,255,255,.5);background:transparent;color:#fff;border-radius:12px;font-size:11px;cursor:pointer}
.count-btn.active{background:rgba(255,255,255,.3);border-color:#fff;font-weight:700}
.dash-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:8px;cursor:pointer}
.dash-item:last-child{border-bottom:none}
.dash-item-circle{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.dash-item-circle:hover{background:rgba(255,255,255,.2)}
.dash-item-circle.checked{background:rgba(255,255,255,.4);border-color:#fff}
.dash-item-circle.checked::after{content:'✓';font-size:11px;font-weight:700}
.dash-item-info{flex:1;min-width:0}
.dash-item-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-item-title.urgent{color:#fca5a5}
.dash-item-type{font-size:11px;opacity:.7;margin-top:1px}
.dash-empty{text-align:center;opacity:.7;padding:16px 0;font-size:14px}
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.sum-num{font-size:20px;font-weight:700;color:var(--primary)}
.sum-label{font-size:11px;color:var(--muted);margin-top:2px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-warning{background:var(--warning);color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;display:none}
.add-form.visible{display:block}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
input[type=text],input[type=date],textarea,select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text)}
textarea{resize:vertical;min-height:60px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary)}
.form-actions{display:flex;gap:8px;margin-top:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.bulk-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:10px;font-size:12px;max-height:200px;overflow-y:auto}
.bulk-row{padding:4px 0;border-bottom:1px solid var(--border)}
.bulk-row:last-child{border-bottom:none}
.group-tabs{display:flex;background:var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.group-tab{flex:1;padding:8px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--muted);text-align:center}
.group-tab.active{background:var(--primary);color:#fff;font-weight:700}
@media(min-width:480px){.summary-grid{grid-template-columns:repeat(4,1fr)}}
</style></head>
<body>
<div class="app">

<div class="section active" id="sec-dashboard">
  <div class="header"><h1>📊 마케팅 데스크</h1></div>
  <div id="dash-summary" class="summary-grid"></div>
  <div class="dash-hero">
    <div class="dash-hero-top">
      <span>지금 할 일</span>
      <div class="count-btns" id="count-btns"></div>
    </div>
    <div id="dash-items"></div>
  </div>
</div>

<div class="section" id="sec-step0">
  <div class="header"><h1>🚀 STEP 0 셋업</h1></div>
  <div class="card">
    <div class="progress-label" id="step0-prog-label"></div>
    <div class="progress-bar"><div class="progress-fill" id="step0-bar" style="width:0%"></div></div>
    <div id="step0-list"></div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="showForm('step0-form')">+ 항목 추가</button>
  <div class="add-form" id="step0-form">
    <div class="form-row"><label>제목</label><input type="text" id="step0-title" placeholder="항목 제목"></div>
    <div class="form-row"><label>메모 (선택)</label><textarea id="step0-memo" placeholder="메모"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveStep0()">저장</button>
      <button class="btn btn-outline" onclick="hideForm('step0-form')">취소</button>
    </div>
  </div>
</div>

<div class="section" id="sec-weekly">
  <div class="header"><h1>📅 매주 루틴</h1></div>
  <div class="btn-row">
    <button class="btn btn-warning btn-sm" onclick="resetWeek()">🔄 새 주 시작 (체크 초기화)</button>
  </div>
  <div class="card">
    <div class="progress-label" id="weekly-prog-label"></div>
    <div class="progress-bar"><div class="progress-fill" id="weekly-bar" style="width:0%"></div></div>
    <div id="weekly-list"></div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="showForm('weekly-form')">+ 항목 추가</button>
  <div class="add-form" id="weekly-form">
    <div class="form-row"><label>제목</label><input type="text" id="weekly-title" placeholder="루틴 항목"></div>
    <div class="form-row"><label>메모 (선택)</label><textarea id="weekly-memo" placeholder="메모"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveWeekly()">저장</button>
      <button class="btn btn-outline" onclick="hideForm('weekly-form')">취소</button>
    </div>
  </div>
</div>

<div class="section" id="sec-monthly">
  <div class="header"><h1>📆 매월 루틴</h1></div>
  <div class="btn-row">
    <button class="btn btn-warning btn-sm" onclick="resetMonth()">🔄 새 달 시작 (체크 초기화)</button>
  </div>
  <div class="group-tabs" id="group-tabs">
    <button class="group-tab active" data-group="early" onclick="switchGroup('early')">월초 (1~10일)</button>
    <button class="group-tab" data-group="mid" onclick="switchGroup('mid')">월중 (11~20일)</button>
    <button class="group-tab" data-group="late" onclick="switchGroup('late')">월말 (21일~)</button>
  </div>
  <div class="card">
    <div class="progress-label" id="monthly-prog-label"></div>
    <div class="progress-bar"><div class="progress-fill" id="monthly-bar" style="width:0%"></div></div>
    <div id="monthly-list"></div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="showForm('monthly-form')">+ 항목 추가</button>
  <div class="add-form" id="monthly-form">
    <div class="form-row"><label>제목</label><input type="text" id="monthly-title" placeholder="루틴 항목"></div>
    <div class="form-row"><label>메모 (선택)</label><textarea id="monthly-memo" placeholder="메모"></textarea></div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveMonthly()">저장</button>
      <button class="btn btn-outline" onclick="hideForm('monthly-form')">취소</button>
    </div>
  </div>
</div>

<div class="section" id="sec-immediate">
  <div class="header"><h1>⚡ 즉시처리</h1></div>
  <div class="btn-row">
    <button class="btn btn-primary btn-sm" onclick="openModal('add-task-modal')">+ 할일 추가</button>
    <button class="btn btn-outline btn-sm" onclick="openModal('bulk-modal')">📋 일괄 등록</button>
    <button class="btn btn-outline btn-sm" onclick="copyAI()">🤖 AI용 복사</button>
    <button class="btn btn-outline btn-sm" onclick="askAI()">💡 AI 조언</button>
  </div>
  <div id="immediate-list"></div>
</div>

</div>

<nav class="bottom-nav">
  <button class="active" data-sec="dashboard" onclick="switchTab('dashboard')"><span class="ico">📊</span>대시보드</button>
  <button data-sec="step0" onclick="switchTab('step0')"><span class="ico">🚀</span>STEP 0</button>
  <button data-sec="weekly" onclick="switchTab('weekly')"><span class="ico">📅</span>매주</button>
  <button data-sec="monthly" onclick="switchTab('monthly')"><span class="ico">📆</span>매월</button>
  <button data-sec="immediate" onclick="switchTab('immediate')"><span class="ico">⚡</span>즉시처리</button>
</nav>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title" id="edit-modal-title">항목 수정</div>
    <div class="form-row"><label>제목</label><input type="text" id="edit-title"></div>
    <div class="form-row"><label>메모</label><textarea id="edit-memo"></textarea></div>
    <div class="form-row" id="edit-group-row" style="display:none"><label>그룹</label>
      <select id="edit-group"><option value="early">월초</option><option value="mid">월중</option><option value="late">월말</option></select>
    </div>
    <div class="form-row" id="edit-deadline-row" style="display:none"><label>마감일</label><input type="date" id="edit-deadline"></div>
    <div class="form-row" id="edit-priority-row" style="display:none"><label>우선순위</label>
      <select id="edit-priority"><option value="5">5 (최고)</option><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1 (최저)</option></select>
    </div>
    <div class="form-row" id="edit-status-row" style="display:none"><label>상태</label>
      <select id="edit-status"><option value="pending">대기</option><option value="in_progress">진행중</option><option value="done">완료</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="submitEdit()">저장</button>
      <button class="btn btn-outline" onclick="closeModal('edit-modal')">취소</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-task-modal">
  <div class="modal">
    <div class="modal-title">할일 추가</div>
    <div class="form-row"><label>제목</label><input type="text" id="add-task-title" placeholder="할일 제목"></div>
    <div class="form-row"><label>마감일</label><input type="date" id="add-task-deadline"></div>
    <div class="form-row"><label>우선순위</label>
      <select id="add-task-priority"><option value="5">5 (최고)</option><option value="4">4</option><option value="3" selected>3</option><option value="2">2</option><option value="1">1 (최저)</option></select>
    </div>
    <div class="form-row"><label>상태</label>
      <select id="add-task-status"><option value="pending" selected>대기</option><option value="in_progress">진행중</option></select>
    </div>
    <div class="form-row"><label>메모</label><textarea id="add-task-memo" placeholder="메모"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="submitAddTask()">추가</button>
      <button class="btn btn-outline" onclick="closeModal('add-task-modal')">취소</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="bulk-modal">
  <div class="modal">
    <div class="modal-title">일괄 등록</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:8px">형식: 제목 | 우선순위(1~5) | 마감(YYYY-MM-DD) | 메모<br>한 줄에 하나씩</p>
    <textarea id="bulk-text" style="min-height:120px" placeholder="SEO 리포트 | 5 | 2026-07-01 | 월말 보고용&#10;리뷰 답글 처리 | 4 | 2026-06-30"></textarea>
    <div id="bulk-preview-area"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="previewBulk()">미리보기</button>
      <button class="btn btn-primary" id="bulk-confirm-btn" onclick="confirmBulk()" style="display:none">등록</button>
      <button class="btn btn-outline" onclick="closeModal('bulk-modal')">취소</button>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
