<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Marketing Desk</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --danger: #dc2626;
    --success: #16a34a;
    --warn: #d97706;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--primary); color: #fff; padding: 14px 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .5px; }

  nav { display: flex; background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 52px; z-index: 99; overflow-x: auto; }
  nav button { flex: 1; min-width: 80px; padding: 11px 8px; border: none; background: transparent; font-size: .85rem; font-weight: 600; color: var(--muted); cursor: pointer; white-space: nowrap; transition: color .15s, border-bottom .15s; border-bottom: 3px solid transparent; }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

  main { max-width: 720px; margin: 0 auto; padding: 16px; }

  .section { display: none; }
  .section.active { display: block; }

  .progress-bar-wrap { background: var(--border); border-radius: 99px; height: 8px; margin: 8px 0 4px; }
  .progress-bar { height: 8px; border-radius: 99px; background: var(--success); transition: width .3s; }
  .progress-label { font-size: .8rem; color: var(--muted); margin-bottom: 12px; }

  .action-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .action-row .spacer { flex: 1; }
  .btn { padding: 8px 14px; border-radius: var(--radius); border: none; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: .78rem; }

  /* checklist items */
  .item-list { display: flex; flex-direction: column; gap: 8px; }
  .item-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; transition: border-color .15s; }
  .item-card.checked { opacity: .6; }
  .item-card.checked .item-title { text-decoration: line-through; color: var(--muted); }
  .item-top { display: flex; align-items: flex-start; gap: 10px; }
  .item-check { width: 20px; height: 20px; flex-shrink: 0; cursor: pointer; accent-color: var(--success); margin-top: 2px; }
  .item-title { font-size: .95rem; font-weight: 600; flex: 1; word-break: break-word; }
  .item-memo { font-size: .82rem; color: var(--muted); margin-top: 4px; margin-left: 30px; word-break: break-word; }
  .item-actions { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }

  /* group headers for monthly */
  .group-header { display: flex; align-items: center; gap: 10px; margin: 16px 0 8px; }
  .group-title { font-size: .9rem; font-weight: 700; color: var(--primary); }
  .group-progress { font-size: .78rem; color: var(--muted); }

  /* immediate tasks */
  .task-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .task-card.overdue { border-color: var(--danger); }
  .task-card.near-due { border-color: var(--warn); }
  .task-card.done-task { opacity: .55; }
  .task-top { display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .task-title { font-size: .95rem; font-weight: 600; flex: 1; word-break: break-word; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: .72rem; font-weight: 700; }
  .badge-pri { background: #dbeafe; color: #1d4ed8; }
  .badge-status-pending { background: #f1f5f9; color: #475569; }
  .badge-status-in_progress { background: #fef9c3; color: #854d0e; }
  .badge-status-done { background: #dcfce7; color: #15803d; }
  .badge-overdue { background: #fee2e2; color: var(--danger); }
  .badge-near { background: #fef3c7; color: #92400e; }
  .task-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; align-items: center; font-size: .8rem; color: var(--muted); }
  .task-memo { font-size: .82rem; color: var(--muted); margin-top: 6px; }
  .task-actions { display: flex; gap: 6px; margin-left: auto; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .overlay.hidden { display: none; }
  .modal { background: var(--card); border-radius: 14px; padding: 20px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .9rem; color: var(--text); outline: none; }
  .form-group textarea { resize: vertical; min-height: 64px; }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

  /* priority stars */
  .stars { display: inline-flex; gap: 2px; }
  .star { color: #f59e0b; font-size: .85rem; }
  .star.empty { color: var(--border); }

  /* empty state */
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: .9rem; }

  @media (max-width: 480px) {
    nav button { font-size: .78rem; padding: 10px 6px; }
    .item-actions, .task-actions { flex-direction: column; gap: 4px; }
    .task-top { flex-direction: column; }
    .task-actions { flex-direction: row; }
  }
</style>
</head>
<body>

<header><h1>📋 Marketing Desk</h1></header>

<nav>
  <button class="active" onclick="switchTab('step0')">STEP 0</button>
  <button onclick="switchTab('weekly')">매주 루틴</button>
  <button onclick="switchTab('monthly')">매월 루틴</button>
  <button onclick="switchTab('immediate')">즉시처리</button>
</nav>

<main>

<!-- STEP 0 -->
<section class="section active" id="tab-step0">
  <div class="action-row">
    <div style="flex:1">
      <div class="progress-bar-wrap"><div class="progress-bar" id="s0-bar" style="width:0%"></div></div>
      <div class="progress-label" id="s0-label">0 / 0 완료</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openModal('step0')">+ 항목 추가</button>
  </div>
  <div class="item-list" id="step0-list"></div>
</section>

<!-- WEEKLY -->
<section class="section" id="tab-weekly">
  <div class="action-row">
    <div style="flex:1">
      <div class="progress-bar-wrap"><div class="progress-bar" id="wk-bar" style="width:0%"></div></div>
      <div class="progress-label" id="wk-label">0 / 0 완료</div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="resetWeekly()">새 주 시작</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('weekly')">+ 항목 추가</button>
  </div>
  <div class="item-list" id="weekly-list"></div>
</section>

<!-- MONTHLY -->
<section class="section" id="tab-monthly">
  <div class="action-row">
    <span class="spacer"></span>
    <button class="btn btn-outline btn-sm" onclick="resetMonthly()">새 달 시작</button>
    <button class="btn btn-primary btn-sm" onclick="openModal('monthly')">+ 항목 추가</button>
  </div>
  <div id="monthly-container"></div>
</section>

<!-- IMMEDIATE -->
<section class="section" id="tab-immediate">
  <div class="action-row">
    <span class="spacer"></span>
    <button class="btn btn-primary btn-sm" onclick="openModal('immediate')">+ 할일 추가</button>
  </div>
  <div class="item-list" id="immediate-list"></div>
</section>

</main>

<!-- Modal -->
<div class="overlay hidden" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">항목 추가</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
const API = '';
let currentTab = 'step0';
let modalMode = null; // 'step0' | 'weekly' | 'monthly' | 'immediate'
let editingId = null;

// ── Tab switching ───────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('nav button').forEach((b, i) => {
    b.classList.toggle('active', ['step0','weekly','monthly','immediate'][i] === tab);
  });
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'tab-' + tab));
  loadTab(tab);
}

function loadTab(tab) {
  if (tab === 'step0') loadStep0();
  else if (tab === 'weekly') loadWeekly();
  else if (tab === 'monthly') loadMonthly();
  else loadImmediate();
}

// ── Helpers ─────────────────────────────────────────────────────────────
function stars(n) {
  return '<span class="stars">' +
    Array.from({length:5}, (_,i) => `<span class="star${i < n ? '' : ' empty'}">★</span>`).join('') +
  '</span>';
}

function deadlineBadge(dl) {
  if (!dl) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dl + 'T00:00:00');
  const diff = Math.floor((d - today) / 86400000);
  if (diff < 0) return '<span class="badge badge-overdue">D+' + Math.abs(diff) + ' 지남</span>';
  if (diff <= 3) return '<span class="badge badge-near">D-' + diff + '</span>';
  return '<span style="font-size:.8rem;color:var(--muted)">' + dl + '</span>';
}

function cardClass(task) {
  if (task.status === 'done') return 'task-card done-task';
  if (!task.deadline) return 'task-card';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(task.deadline + 'T00:00:00');
  const diff = Math.floor((d - today) / 86400000);
  if (diff < 0) return 'task-card overdue';
  if (diff <= 3) return 'task-card near-due';
  return 'task-card';
}

function progressHTML(checked, total, barId, labelId) {
  const pct = total ? Math.round(checked / total * 100) : 0;
  return { pct, text: `${checked} / ${total} 완료` };
}

function setProgress(barId, labelId, checked, total) {
  const pct = total ? Math.round(checked / total * 100) : 0;
  const bar = document.getElementById(barId);
  const lbl = document.getElementById(labelId);
  if (bar) bar.style.width = pct + '%';
  if (lbl) lbl.textContent = `${checked} / ${total} 완료`;
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (r.status === 204) return null;
  return r.json();
}

// ── STEP 0 ───────────────────────────────────────────────────────────────
async function loadStep0() {
  const items = await api('GET', '/step0');
  const list = document.getElementById('step0-list');
  const checked = items.filter(i => i.checked).length;
  setProgress('s0-bar', 's0-label', checked, items.length);
  if (!items.length) { list.innerHTML = '<div class="empty">항목이 없습니다. 추가해 보세요.</div>'; return; }
  list.innerHTML = items.map(item => `
    <div class="item-card${item.checked ? ' checked' : ''}" id="s0-${item.id}">
      <div class="item-top">
        <input type="checkbox" class="item-check" ${item.checked ? 'checked' : ''} onchange="toggleStep0(${item.id})" />
        <span class="item-title">${esc(item.title)}</span>
        <div class="item-actions">
          <button class="btn btn-outline btn-sm" onclick="openModal('step0',${item.id})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteStep0(${item.id})">삭제</button>
        </div>
      </div>
      ${item.memo ? `<div class="item-memo">${esc(item.memo)}</div>` : ''}
    </div>`).join('');
}

async function toggleStep0(id) {
  await api('PATCH', `/step0/${id}/check`);
  loadStep0();
}

async function deleteStep0(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await api('DELETE', `/step0/${id}`);
  loadStep0();
}

// ── WEEKLY ────────────────────────────────────────────────────────────────
async function loadWeekly() {
  const items = await api('GET', '/weekly');
  const list = document.getElementById('weekly-list');
  const checked = items.filter(i => i.checked).length;
  setProgress('wk-bar', 'wk-label', checked, items.length);
  if (!items.length) { list.innerHTML = '<div class="empty">항목이 없습니다. 추가해 보세요.</div>'; return; }
  list.innerHTML = items.map(item => `
    <div class="item-card${item.checked ? ' checked' : ''}" id="wk-${item.id}">
      <div class="item-top">
        <input type="checkbox" class="item-check" ${item.checked ? 'checked' : ''} onchange="toggleWeekly(${item.id})" />
        <span class="item-title">${esc(item.title)}</span>
        <div class="item-actions">
          <button class="btn btn-outline btn-sm" onclick="openModal('weekly',${item.id})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteWeekly(${item.id})">삭제</button>
        </div>
      </div>
      ${item.memo ? `<div class="item-memo">${esc(item.memo)}</div>` : ''}
    </div>`).join('');
}

async function toggleWeekly(id) {
  await api('PATCH', `/weekly/${id}/check`);
  loadWeekly();
}

async function deleteWeekly(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await api('DELETE', `/weekly/${id}`);
  loadWeekly();
}

async function resetWeekly() {
  if (!confirm('새 주를 시작합니다. 모든 체크가 해제됩니다. 계속하시겠습니까?')) return;
  await api('POST', '/weekly/reset');
  loadWeekly();
}

// ── MONTHLY ───────────────────────────────────────────────────────────────
async function loadMonthly() {
  const items = await api('GET', '/monthly');
  const container = document.getElementById('monthly-container');
  const groups = { '월초': [], '월중': [], '월말': [] };
  items.forEach(i => { if (groups[i.period]) groups[i.period].push(i); });
  let html = '';
  for (const [period, gItems] of Object.entries(groups)) {
    const checked = gItems.filter(i => i.checked).length;
    const pct = gItems.length ? Math.round(checked / gItems.length * 100) : 0;
    html += `
      <div class="group-header">
        <span class="group-title">${period}</span>
        <span class="group-progress">${checked}/${gItems.length} (${pct}%)</span>
      </div>
      <div class="item-list" style="margin-bottom:8px">
        ${gItems.length === 0 ? '<div class="empty" style="padding:12px">항목 없음</div>' :
          gItems.map(item => `
          <div class="item-card${item.checked ? ' checked' : ''}" id="mo-${item.id}">
            <div class="item-top">
              <input type="checkbox" class="item-check" ${item.checked ? 'checked' : ''} onchange="toggleMonthly(${item.id})" />
              <span class="item-title">${esc(item.title)}</span>
              <div class="item-actions">
                <button class="btn btn-outline btn-sm" onclick="openModal('monthly',${item.id})">수정</button>
                <button class="btn btn-danger btn-sm" onclick="deleteMonthly(${item.id})">삭제</button>
              </div>
            </div>
            ${item.memo ? `<div class="item-memo">${esc(item.memo)}</div>` : ''}
          </div>`).join('')}
      </div>`;
  }
  container.innerHTML = html;
}

async function toggleMonthly(id) {
  await api('PATCH', `/monthly/${id}/check`);
  loadMonthly();
}

async function deleteMonthly(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await api('DELETE', `/monthly/${id}`);
  loadMonthly();
}

async function resetMonthly() {
  if (!confirm('새 달을 시작합니다. 모든 체크가 해제됩니다. 계속하시겠습니까?')) return;
  await api('POST', '/monthly/reset');
  loadMonthly();
}

// ── IMMEDIATE ─────────────────────────────────────────────────────────────
async function loadImmediate() {
  const tasks = await api('GET', '/immediate');
  const list = document.getElementById('immediate-list');
  if (!tasks.length) { list.innerHTML = '<div class="empty">할일이 없습니다. 추가해 보세요.</div>'; return; }
  const statusLabel = { pending: '대기', in_progress: '진행중', done: '완료' };
  list.innerHTML = tasks.map(t => `
    <div class="${cardClass(t)}" id="im-${t.id}">
      <div class="task-top">
        <span class="task-title">${esc(t.title)}</span>
        <div class="task-actions">
          <button class="btn btn-outline btn-sm" onclick="openModal('immediate',${t.id})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteImmediate(${t.id})">삭제</button>
        </div>
      </div>
      <div class="task-meta">
        ${stars(t.priority)}
        <span class="badge badge-status-${t.status}">${statusLabel[t.status] || t.status}</span>
        ${deadlineBadge(t.deadline)}
      </div>
      ${t.memo ? `<div class="task-memo">${esc(t.memo)}</div>` : ''}
    </div>`).join('');
}

async function deleteImmediate(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  await api('DELETE', `/immediate/${id}`);
  loadImmediate();
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(mode, id) {
  modalMode = mode;
  editingId = id || null;
  document.getElementById('modal-overlay').classList.remove('hidden');

  if (mode === 'step0' || mode === 'weekly') {
    openChecklistModal(mode, id);
  } else if (mode === 'monthly') {
    openMonthlyModal(id);
  } else {
    openImmediateModal(id);
  }
}

async function openChecklistModal(mode, id) {
  let item = null;
  if (id) item = await api('GET', `/${mode}`).then(list => list.find(i => i.id === id));
  const title = id ? '항목 수정' : '항목 추가';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>제목 *</label>
      <input id="f-title" type="text" placeholder="제목을 입력하세요" value="${item ? esc(item.title) : ''}" />
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="f-memo" placeholder="메모 (선택)">${item ? esc(item.memo || '') : ''}</textarea>
    </div>`;
}

async function openMonthlyModal(id) {
  let item = null;
  if (id) item = await api('GET', '/monthly').then(list => list.find(i => i.id === id));
  document.getElementById('modal-title').textContent = id ? '항목 수정' : '항목 추가';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>구분 *</label>
      <select id="f-period">
        <option value="월초" ${item && item.period === '월초' ? 'selected' : ''}>월초</option>
        <option value="월중" ${item && item.period === '월중' ? 'selected' : ''}>월중</option>
        <option value="월말" ${item && item.period === '월말' ? 'selected' : ''}>월말</option>
      </select>
    </div>
    <div class="form-group">
      <label>제목 *</label>
      <input id="f-title" type="text" placeholder="제목을 입력하세요" value="${item ? esc(item.title) : ''}" />
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="f-memo" placeholder="메모 (선택)">${item ? esc(item.memo || '') : ''}</textarea>
    </div>`;
}

async function openImmediateModal(id) {
  let task = null;
  if (id) task = await api('GET', '/immediate').then(list => list.find(t => t.id === id));
  document.getElementById('modal-title').textContent = id ? '할일 수정' : '할일 추가';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>제목 *</label>
      <input id="f-title" type="text" placeholder="제목을 입력하세요" value="${task ? esc(task.title) : ''}" />
    </div>
    <div class="form-group">
      <label>마감일</label>
      <input id="f-deadline" type="date" value="${task && task.deadline ? task.deadline : ''}" />
    </div>
    <div class="form-group">
      <label>우선순위 (1~5)</label>
      <select id="f-priority">
        ${[1,2,3,4,5].map(n => `<option value="${n}" ${task && task.priority === n ? 'selected' : n === 3 && !task ? 'selected' : ''}>${n}점 ${'★'.repeat(n)}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label>상태</label>
      <select id="f-status">
        <option value="pending" ${!task || task.status === 'pending' ? 'selected' : ''}>대기</option>
        <option value="in_progress" ${task && task.status === 'in_progress' ? 'selected' : ''}>진행중</option>
        <option value="done" ${task && task.status === 'done' ? 'selected' : ''}>완료</option>
      </select>
    </div>
    <div class="form-group">
      <label>메모</label>
      <textarea id="f-memo" placeholder="메모 (선택)">${task ? esc(task.memo || '') : ''}</textarea>
    </div>`;
}

async function saveModal() {
  const title = document.getElementById('f-title')?.value?.trim();
  const memo = document.getElementById('f-memo')?.value?.trim() || null;

  if (modalMode === 'step0' || modalMode === 'weekly') {
    if (!title) { alert('제목을 입력하세요.'); return; }
    const body = { title, memo };
    if (editingId) await api('PUT', `/${modalMode}/${editingId}`, body);
    else await api('POST', `/${modalMode}`, body);
    closeModal();
    if (modalMode === 'step0') loadStep0(); else loadWeekly();

  } else if (modalMode === 'monthly') {
    const period = document.getElementById('f-period')?.value;
    if (!title) { alert('제목을 입력하세요.'); return; }
    const body = { title, memo, period };
    if (editingId) await api('PUT', `/monthly/${editingId}`, body);
    else await api('POST', '/monthly', body);
    closeModal();
    loadMonthly();

  } else if (modalMode === 'immediate') {
    if (!title) { alert('제목을 입력하세요.'); return; }
    const deadline = document.getElementById('f-deadline')?.value || null;
    const priority = parseInt(document.getElementById('f-priority')?.value || '3');
    const status = document.getElementById('f-status')?.value || 'pending';
    const body = { title, memo, deadline, priority, status };
    if (editingId) await api('PUT', `/immediate/${editingId}`, body);
    else await api('POST', '/immediate', body);
    closeModal();
    loadImmediate();
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  modalMode = null;
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target.id === 'modal-overlay') closeModal();
}

function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────
loadStep0();
</script>
</body>
</html>
