<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>My Life</title>
<style>
  :root {
    --primary: #5c6bc0;
    --danger: #e53935;
    --success: #43a047;
    --warn: #fb8c00;
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #212121;
    --sub: #757575;
    --border: #e0e0e0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Auth Screen ── */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .auth-box { background: var(--card); border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
  .auth-box h1 { font-size: 1.6rem; text-align: center; margin-bottom: .4rem; color: var(--primary); }
  .auth-box p { text-align: center; color: var(--sub); font-size: .85rem; margin-bottom: 1.5rem; }
  .auth-box input { width: 100%; padding: .75rem 1rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; margin-bottom: .75rem; }
  .auth-box button { width: 100%; padding: .75rem; background: var(--primary); color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
  #auth-error { color: var(--danger); font-size: .85rem; text-align: center; margin-top: .5rem; display: none; }

  /* ── App Shell ── */
  #app-screen { display: none; max-width: 600px; margin: 0 auto; padding-bottom: 2rem; }
  header { background: var(--primary); color: #fff; padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 1.1rem; }
  #logout-btn { background: none; border: 1px solid rgba(255,255,255,.6); color: #fff; padding: .3rem .7rem; border-radius: 8px; font-size: .8rem; cursor: pointer; }

  /* ── Tabs ── */
  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 48px; z-index: 99; }
  .tab-btn { flex: 1; padding: .75rem; background: none; border: none; font-size: .95rem; cursor: pointer; color: var(--sub); border-bottom: 3px solid transparent; transition: .2s; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  /* ── Common ── */
  .section { padding: 1rem; }
  .card { background: var(--card); border-radius: 12px; padding: 1rem; margin-bottom: .75rem; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .btn { padding: .5rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-size: .9rem; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: .3rem .6rem; font-size: .8rem; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--text); }
  .tag { display: inline-block; padding: .2rem .5rem; border-radius: 6px; font-size: .75rem; }
  label { font-size: .85rem; color: var(--sub); display: block; margin-bottom: .25rem; margin-top: .6rem; }
  input, select, textarea { width: 100%; padding: .55rem .75rem; border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; background: var(--bg); }
  textarea { resize: vertical; min-height: 60px; }
  .row { display: flex; gap: .5rem; flex-wrap: wrap; }
  .row .btn { flex: 1; text-align: center; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: flex; align-items: flex-end; }
  .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 600px; margin: 0 auto; padding: 1.25rem; max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin-bottom: 1rem; }
  .modal-actions { display: flex; gap: .5rem; margin-top: 1rem; }
  .modal-actions button { flex: 1; }

  /* ── Todo ── */
  .filter-bar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .75rem; }
  .filter-btn { padding: .35rem .8rem; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: .82rem; cursor: pointer; color: var(--sub); }
  .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .todo-item { display: flex; align-items: flex-start; gap: .75rem; }
  .todo-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; cursor: pointer; flex-shrink: 0; margin-top: .1rem; display: flex; align-items: center; justify-content: center; }
  .todo-check.done-check { background: var(--success); border-color: var(--success); color: #fff; font-size: .8rem; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-title { font-weight: 500; word-break: break-word; }
  .todo-meta { font-size: .78rem; color: var(--sub); margin-top: .2rem; display: flex; gap: .5rem; flex-wrap: wrap; }
  .overdue { color: var(--danger); font-weight: 600; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 2px; }
  .p1 { background: var(--danger); } .p2 { background: var(--warn); }
  .p3 { background: #fdd835; } .p4 { background: #66bb6a; } .p5 { background: #90caf9; }
  .status-tag { font-size: .72rem; padding: .15rem .4rem; border-radius: 4px; }
  .s-pending { background: #eeeeee; color: var(--sub); }
  .s-in_progress { background: #e3f2fd; color: #1565c0; }
  .s-done { background: #e8f5e9; color: #2e7d32; }
  .todo-actions { display: flex; gap: .35rem; flex-shrink: 0; }

  /* ── Budget ── */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; margin-bottom: .75rem; }
  .summary-card { background: var(--card); border-radius: 10px; padding: .7rem; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .summary-card .label { font-size: .72rem; color: var(--sub); }
  .summary-card .amount { font-size: 1rem; font-weight: 700; margin-top: .2rem; }
  .income-color { color: var(--success); }
  .expense-color { color: var(--danger); }
  .balance-color { color: var(--primary); }
  .month-nav { display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: .3rem .7rem; cursor: pointer; }
  .month-nav span { flex: 1; text-align: center; font-weight: 600; }
  .entry-item { display: flex; justify-content: space-between; align-items: flex-start; }
  .entry-left .entry-cat { font-size: .78rem; color: var(--sub); }
  .entry-left .entry-memo { font-size: .78rem; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .entry-right { text-align: right; }
  .entry-amount { font-weight: 700; }
  .entry-date { font-size: .75rem; color: var(--sub); }
  .entry-actions { display: flex; gap: .35rem; margin-top: .3rem; justify-content: flex-end; }
  .cat-item { display: flex; justify-content: space-between; align-items: center; padding: .4rem 0; border-bottom: 1px solid var(--border); }
  .section-title { font-size: .82rem; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: .6rem; }
  .empty-msg { text-align: center; color: var(--sub); padding: 2rem 0; font-size: .9rem; }
  .fab { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 54px; height: 54px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 1.6rem; border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; z-index: 150; }

  /* ── Bulk Paste ── */
  .bulk-section { margin-bottom: .75rem; }
  .bulk-toggle { width: 100%; text-align: left; padding: .6rem .75rem; background: var(--card); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: .88rem; color: var(--primary); display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
  .bulk-content { background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 1rem; display: none; }
  .bulk-content.open { display: block; }
  .bulk-header-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
  .copy-msg { font-size: .78rem; color: var(--success); display: none; }
  .bulk-preview { margin-top: .75rem; overflow-x: auto; }
  .bulk-preview table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .bulk-preview th { background: var(--bg); padding: .3rem .5rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .bulk-preview td { padding: .3rem .5rem; border-bottom: 1px solid var(--border); word-break: break-word; }
  .bulk-preview .err-row td { color: var(--danger); background: #fff3f3; }
  .bulk-count { font-size: .82rem; color: var(--sub); margin-bottom: .4rem; }

  /* ── Now Todo ── */
  .now-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .5rem; }
  .count-selector { display: flex; gap: .3rem; }
  .count-btn { padding: .2rem .55rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); font-size: .8rem; cursor: pointer; color: var(--sub); }
  .count-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .now-todo-item { display: flex; align-items: center; gap: .6rem; padding: .45rem 0; border-bottom: 1px solid var(--border); }
  .now-todo-item:last-child { border-bottom: none; }
  .now-todo-title { flex: 1; font-weight: 500; word-break: break-word; font-size: .92rem; }
  .now-todo-date { font-size: .75rem; white-space: nowrap; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>🔒 My Life</h1>
    <p>비밀번호를 입력해 접속하세요</p>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="current-password">
    <button onclick="doLogin()">접속</button>
    <div id="auth-error">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <header>
    <h1>My Life</h1>
    <button id="logout-btn" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('todo')">할일</button>
    <button class="tab-btn" onclick="switchTab('budget')">가계부</button>
  </div>

  <!-- ── Todo Tab ── -->
  <div id="tab-todo" class="section">

    <!-- 지금 할 일 -->
    <div class="card" id="now-todo-section" style="margin-bottom:.75rem">
      <div class="now-header">
        <span class="section-title" style="margin-bottom:0">지금 할 일</span>
        <div class="count-selector">
          <button class="count-btn" data-count="1" onclick="setTopCount(1)">1</button>
          <button class="count-btn" data-count="3" onclick="setTopCount(3)">3</button>
          <button class="count-btn" data-count="5" onclick="setTopCount(5)">5</button>
        </div>
      </div>
      <div id="now-todo-list"></div>
      <div class="empty-msg" id="now-todo-empty" style="display:none;padding:.75rem 0">미완료 할일이 없습니다</div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setTodoFilter('all')">전체</button>
      <button class="filter-btn" data-filter="today" onclick="setTodoFilter('today')">오늘</button>
      <button class="filter-btn" data-filter="week" onclick="setTodoFilter('week')">이번 주</button>
      <button class="filter-btn" data-filter="done" onclick="setTodoFilter('done')">완료</button>
    </div>
    <!-- Bulk Paste: Todo -->
    <div class="bulk-section">
      <button class="bulk-toggle" onclick="toggleBulk('todo')">
        <span>여러 할일 한번에 추가</span><span id="bulk-todo-arrow">▼</span>
      </button>
      <div class="bulk-content" id="bulk-todo-content">
        <div class="bulk-header-row">
          <button class="btn btn-sm btn-outline" onclick="copyAiFormat('todo')">AI용 양식 복사</button>
          <span id="copy-todo-msg" class="copy-msg">복사됨!</span>
        </div>
        <label>한 줄에 하나 (제목 | 우선순위 | 마감 | 메모)</label>
        <textarea id="bulk-todo-input" rows="5" placeholder="집 청소 | 2 | 2026-07-01 | 거실 포함&#10;보고서 작성 | 1 | 2026-06-20&#10;운동하기"></textarea>
        <button class="btn btn-sm btn-primary" style="margin-top:.5rem;width:100%" onclick="previewBulkTodo()">미리보기</button>
        <div id="bulk-todo-preview" class="bulk-preview" style="display:none"></div>
      </div>
    </div>

    <div id="todo-list"></div>
    <div class="empty-msg" id="todo-empty" style="display:none">할일이 없습니다</div>
  </div>

  <!-- ── Budget Tab ── -->
  <div id="tab-budget" class="section" style="display:none">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">수입</div><div class="amount income-color" id="sum-income">0</div></div>
      <div class="summary-card"><div class="label">지출</div><div class="amount expense-color" id="sum-expense">0</div></div>
      <div class="summary-card"><div class="label">잔액</div><div class="amount balance-color" id="sum-balance">0</div></div>
    </div>
    <div id="cat-summary" class="card" style="margin-bottom:.75rem"></div>
    <div class="section-title">내역</div>

    <!-- Bulk Paste: Budget -->
    <div class="bulk-section">
      <button class="bulk-toggle" onclick="toggleBulk('budget')">
        <span>여러 지출 한번에 추가</span><span id="bulk-budget-arrow">▼</span>
      </button>
      <div class="bulk-content" id="bulk-budget-content">
        <div class="bulk-header-row">
          <button class="btn btn-sm btn-outline" onclick="copyAiFormat('budget')">AI용 양식 복사</button>
          <span id="copy-budget-msg" class="copy-msg">복사됨!</span>
        </div>
        <label>한 줄에 하나 (날짜 | 금액 | 분류 | 수입or지출 | 메모)</label>
        <textarea id="bulk-budget-input" rows="5" placeholder="2026-06-15 | 15000 | 식비 | 지출 | 점심&#10;2026-06-16 | 500000 | 급여 | 수입&#10;2026-06-17 | 3000 | 교통비"></textarea>
        <button class="btn btn-sm btn-primary" style="margin-top:.5rem;width:100%" onclick="previewBulkBudget()">미리보기</button>
        <div id="bulk-budget-preview" class="bulk-preview" style="display:none"></div>
      </div>
    </div>

    <div id="budget-list"></div>
    <div class="empty-msg" id="budget-empty" style="display:none">내역이 없습니다</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openAddModal()" style="display:none">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-inner">
    <h3 id="modal-title">추가</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let currentTab = 'todo';
let todoFilter = 'all';
let topCount = parseInt(localStorage.getItem('topTodoCount') || '3');
let budgetYear = new Date().getFullYear();
let budgetMonth = new Date().getMonth() + 1;
let modalMode = null; // 'add-todo' | 'edit-todo' | 'add-entry' | 'edit-entry'
let editId = null;
let categories = [];

// ── Auth ──────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const r = await fetch('/api/auth/status');
  const d = await r.json();
  if (d.authenticated) showApp();
}

async function doLogin() {
  const pw = $('pw-input').value;
  const r = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password: pw}) });
  if (r.ok) { showApp(); }
  else { $('auth-error').style.display = 'block'; }
}

$('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogout() {
  await fetch('/api/auth/logout', {method:'POST'});
  $('app-screen').style.display = 'none';
  $('auth-screen').style.display = 'flex';
  $('fab').style.display = 'none';
  $('pw-input').value = '';
}

function showApp() {
  $('auth-screen').style.display = 'none';
  $('app-screen').style.display = 'block';
  $('fab').style.display = 'flex';
  initTopCountButtons();
  loadTodos();
  loadCategories();
  loadBudget();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='todo') || (i===1 && tab==='budget')));
  $('tab-todo').style.display = tab === 'todo' ? '' : 'none';
  $('tab-budget').style.display = tab === 'budget' ? '' : 'none';
}

// ── Todo ──────────────────────────────────────────────────────────────────────
function setTodoFilter(f) {
  todoFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  loadTodos();
}

function initTopCountButtons() {
  document.querySelectorAll('.count-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.count) === topCount)
  );
}

function setTopCount(n) {
  topCount = n;
  localStorage.setItem('topTodoCount', n);
  document.querySelectorAll('.count-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.count) === n)
  );
  loadTopTodos();
}

async function loadTopTodos() {
  const r = await fetch(`/api/todos/top?count=${topCount}`);
  if (!r.ok) return;
  const todos = await r.json();
  const list = $('now-todo-list');
  list.innerHTML = '';
  if (!todos.length) { $('now-todo-empty').style.display = ''; return; }
  $('now-todo-empty').style.display = 'none';
  const today = new Date().toISOString().split('T')[0];
  todos.forEach(t => {
    const overdue = t.due_date && t.due_date < today;
    const item = document.createElement('div');
    item.className = 'now-todo-item';
    item.innerHTML = `
      <span class="priority-dot p${t.priority}" style="width:10px;height:10px;flex-shrink:0"></span>
      <span class="now-todo-title">${esc(t.title)}</span>
      ${t.due_date ? `<span class="now-todo-date" style="color:${overdue ? 'var(--danger)' : 'var(--sub)'}">${t.due_date}</span>` : ''}`;
    list.appendChild(item);
  });
}

async function loadTodos() {
  const r = await fetch(`/api/todos?filter=${todoFilter}`);
  if (!r.ok) return;
  const todos = await r.json();
  const list = $('todo-list');
  list.innerHTML = '';
  if (!todos.length) { $('todo-empty').style.display = ''; return; }
  $('todo-empty').style.display = 'none';
  const today = new Date().toISOString().split('T')[0];
  todos.forEach(t => {
    const overdue = t.due_date && t.due_date < today && t.status !== 'done';
    const card = document.createElement('div');
    card.className = 'card todo-item';
    card.innerHTML = `
      <div class="todo-check ${t.status==='done'?'done-check':''}" onclick="toggleDone(${t.id},'${t.status}')" title="${t.status==='done'?'완료':'완료 처리'}">
        ${t.status==='done'?'✓':''}
      </div>
      <div class="todo-body">
        <div class="todo-title">${esc(t.title)}</div>
        <div class="todo-meta">
          <span><span class="priority-dot p${t.priority}"></span>P${t.priority}</span>
          <span class="status-tag s-${t.status}">${statusLabel(t.status)}</span>
          ${t.due_date ? `<span class="${overdue?'overdue':''}">${overdue?'⚠ 마감 지남: ':''}${t.due_date}</span>` : ''}
          ${t.memo ? `<span>📝 ${esc(t.memo)}</span>` : ''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="btn btn-sm btn-outline" onclick="openEditTodo(${t.id})">✏</button>
        <button class="btn btn-sm btn-danger" onclick="deleteTodo(${t.id})">✕</button>
      </div>`;
    list.appendChild(card);
  });
  loadTopTodos();
}

async function toggleDone(id, status) {
  const newStatus = status === 'done' ? 'pending' : 'done';
  await fetch(`/api/todos/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status: newStatus}) });
  loadTodos();
}

async function deleteTodo(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch(`/api/todos/${id}`, {method:'DELETE'});
  loadTodos();
}

function openEditTodo(id) {
  fetch(`/api/todos?filter=all`).then(r=>r.json()).then(todos => {
    const t = todos.find(x=>x.id===id);
    if (!t) return;
    editId = id; modalMode = 'edit-todo';
    $('modal-title').textContent = '할일 수정';
    $('modal-body').innerHTML = todoForm(t);
    $('modal').style.display = 'flex';
  });
}

// ── Budget ────────────────────────────────────────────────────────────────────
function changeMonth(delta) {
  budgetMonth += delta;
  if (budgetMonth > 12) { budgetMonth = 1; budgetYear++; }
  if (budgetMonth < 1) { budgetMonth = 12; budgetYear--; }
  loadBudget();
}

async function loadBudget() {
  $('month-label').textContent = `${budgetYear}년 ${budgetMonth}월`;
  const [entries, summary] = await Promise.all([
    fetch(`/api/budget/entries?year=${budgetYear}&month=${budgetMonth}`).then(r=>r.json()),
    fetch(`/api/budget/summary?year=${budgetYear}&month=${budgetMonth}`).then(r=>r.json()),
  ]);
  $('sum-income').textContent = formatKRW(summary.total_income);
  $('sum-expense').textContent = formatKRW(summary.total_expense);
  $('sum-balance').textContent = formatKRW(summary.balance);

  // Category summary
  const catEl = $('cat-summary');
  if (summary.by_category.length) {
    catEl.innerHTML = '<div class="section-title">분류별 지출</div>' +
      summary.by_category.map(c =>
        `<div class="cat-item"><span>${esc(c.name)}</span><span class="expense-color">${formatKRW(c.amount)}</span></div>`
      ).join('');
    catEl.style.display = '';
  } else {
    catEl.style.display = 'none';
  }

  const catNames = Object.fromEntries(categories.map(c=>[c.id, c.name]));
  const list = $('budget-list');
  list.innerHTML = '';
  if (!entries.length) { $('budget-empty').style.display = ''; return; }
  $('budget-empty').style.display = 'none';
  entries.forEach(e => {
    const card = document.createElement('div');
    card.className = 'card entry-item';
    card.innerHTML = `
      <div class="entry-left">
        <div class="entry-cat">${e.category_id ? esc(catNames[e.category_id]||'미분류') : '미분류'} · ${e.entry_type==='income'?'수입':'지출'}</div>
        ${e.memo?`<div class="entry-memo">${esc(e.memo)}</div>`:''}
        <div class="entry-date">${e.date}</div>
      </div>
      <div class="entry-right">
        <div class="entry-amount ${e.entry_type==='income'?'income-color':'expense-color'}">${e.entry_type==='income'?'+':'-'}${formatKRW(e.amount)}</div>
        <div class="entry-actions">
          <button class="btn btn-sm btn-outline" onclick="openEditEntry(${e.id})">✏</button>
          <button class="btn btn-sm btn-danger" onclick="deleteEntry(${e.id})">✕</button>
        </div>
      </div>`;
    list.appendChild(card);
  });
}

async function loadCategories() {
  const r = await fetch('/api/budget/categories');
  categories = await r.json();
}

async function deleteEntry(id) {
  if (!confirm('삭제할까요?')) return;
  await fetch(`/api/budget/entries/${id}`, {method:'DELETE'});
  loadBudget();
}

async function openEditEntry(id) {
  const entries = await fetch(`/api/budget/entries?year=${budgetYear}&month=${budgetMonth}`).then(r=>r.json());
  const e = entries.find(x=>x.id===id);
  if (!e) return;
  editId = id; modalMode = 'edit-entry';
  $('modal-title').textContent = '내역 수정';
  $('modal-body').innerHTML = entryForm(e);
  $('modal').style.display = 'flex';
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openAddModal() {
  editId = null;
  if (currentTab === 'todo') {
    modalMode = 'add-todo';
    $('modal-title').textContent = '할일 추가';
    $('modal-body').innerHTML = todoForm();
  } else {
    modalMode = 'add-entry';
    $('modal-title').textContent = '내역 추가';
    $('modal-body').innerHTML = entryForm();
  }
  $('modal').style.display = 'flex';
}

function closeModal() { $('modal').style.display = 'none'; }
function closeModalOutside(e) { if (e.target === $('modal')) closeModal(); }

async function saveModal() {
  if (modalMode === 'add-todo' || modalMode === 'edit-todo') {
    const body = {
      title: $('f-title').value.trim(),
      priority: parseInt($('f-priority').value),
      status: $('f-status').value,
      due_date: $('f-due').value || null,
      memo: $('f-memo').value.trim() || null,
    };
    if (!body.title) return alert('제목을 입력하세요');
    if (modalMode === 'add-todo') await fetch('/api/todos', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    else await fetch(`/api/todos/${editId}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    closeModal(); loadTodos();
  } else {
    const body = {
      date: $('f-date').value,
      amount: parseInt($('f-amount').value),
      category_id: $('f-cat').value ? parseInt($('f-cat').value) : null,
      entry_type: $('f-type').value,
      memo: $('f-ememo').value.trim() || null,
    };
    if (!body.date || !body.amount) return alert('날짜와 금액을 입력하세요');
    if (modalMode === 'add-entry') await fetch('/api/budget/entries', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    else await fetch(`/api/budget/entries/${editId}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
    closeModal(); loadBudget();
  }
}

// ── Forms ─────────────────────────────────────────────────────────────────────
function todoForm(t={}) {
  return `
    <label>제목 *</label><input id="f-title" value="${esc(t.title||'')}">
    <label>우선순위</label>
    <select id="f-priority">
      ${[1,2,3,4,5].map(n=>`<option value="${n}" ${(t.priority||3)===n?'selected':''}>${n} ${'★'.repeat(n)}</option>`).join('')}
    </select>
    <label>상태</label>
    <select id="f-status">
      <option value="pending" ${(t.status||'pending')==='pending'?'selected':''}>대기</option>
      <option value="in_progress" ${t.status==='in_progress'?'selected':''}>진행중</option>
      <option value="done" ${t.status==='done'?'selected':''}>완료</option>
    </select>
    <label>마감일</label><input type="date" id="f-due" value="${t.due_date||''}">
    <label>메모</label><textarea id="f-memo">${esc(t.memo||'')}</textarea>`;
}

function entryForm(e={}) {
  const today = new Date().toISOString().split('T')[0];
  const catOptions = categories.map(c=>`<option value="${c.id}" ${e.category_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  return `
    <label>날짜 *</label><input type="date" id="f-date" value="${e.date||today}">
    <label>금액 (원) *</label><input type="number" id="f-amount" value="${e.amount||''}" min="0">
    <label>구분</label>
    <select id="f-type">
      <option value="expense" ${(e.entry_type||'expense')==='expense'?'selected':''}>지출</option>
      <option value="income" ${e.entry_type==='income'?'selected':''}>수입</option>
    </select>
    <label>분류</label>
    <select id="f-cat">
      <option value="">미분류</option>${catOptions}
    </select>
    <div style="margin-top:.5rem;display:flex;gap:.5rem">
      <input id="new-cat-input" placeholder="새 분류 이름" style="flex:1">
      <button type="button" class="btn btn-outline btn-sm" onclick="addCategory()">추가</button>
    </div>
    <label>메모</label><textarea id="f-ememo">${esc(e.memo||'')}</textarea>`;
}

async function addCategory() {
  const name = $('new-cat-input').value.trim();
  if (!name) return;
  const r = await fetch('/api/budget/categories', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name})});
  if (r.ok) {
    await loadCategories();
    const sel = $('f-cat');
    if (sel) {
      sel.innerHTML = '<option value="">미분류</option>' + categories.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
      const newCat = categories.find(c=>c.name===name);
      if (newCat) sel.value = newCat.id;
    }
    $('new-cat-input').value = '';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatKRW(n) { return n.toLocaleString('ko-KR') + '원'; }
function statusLabel(s) { return {pending:'대기',in_progress:'진행중',done:'완료'}[s]||s; }

// ── Bulk Paste ────────────────────────────────────────────────────────────────
function toggleBulk(tab) {
  const content = $(`bulk-${tab}-content`);
  const arrow = $(`bulk-${tab}-arrow`);
  const isOpen = content.classList.contains('open');
  content.classList.toggle('open', !isOpen);
  arrow.textContent = isOpen ? '▼' : '▲';
}

function copyAiFormat(tab) {
  const text = tab === 'todo'
    ? '내 할 일들을 아래 양식으로 정리해줘. 한 줄에 하나씩, 파이프(|)로 구분:\n제목 | 우선순위(1~5) | 마감(YYYY-MM-DD) | 메모\n(뒤 항목은 모르면 생략 가능)'
    : '내 지출 내역을 아래 양식으로 정리해줘. 한 줄에 하나씩, 파이프(|)로 구분:\n날짜(YYYY-MM-DD) | 금액 | 분류 | 수입or지출 | 메모';
  navigator.clipboard.writeText(text).then(() => {
    const msg = $(`copy-${tab}-msg`);
    msg.style.display = 'inline';
    setTimeout(() => { msg.style.display = 'none'; }, 2000);
  });
}

function parseTodoLines(raw) {
  return raw.split('\n').map(l => l.trim()).filter(l => l).map((line, i) => {
    const parts = line.split('|').map(p => p.trim());
    const title = parts[0];
    if (!title) return { _error: `줄 ${i+1}: 제목 없음`, _raw: line };
    let priority = 3;
    if (parts[1]) {
      const p = parseInt(parts[1]);
      if (isNaN(p) || p < 1 || p > 5) return { _error: `줄 ${i+1}: 우선순위는 1~5 숫자`, _raw: line };
      priority = p;
    }
    let due_date = null;
    if (parts[2]) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(parts[2])) return { _error: `줄 ${i+1}: 마감일 형식 오류 (YYYY-MM-DD)`, _raw: line };
      due_date = parts[2];
    }
    const memo = parts[3] || null;
    return { title, priority, status: 'pending', due_date, memo };
  });
}

function parseBudgetLines(raw) {
  return raw.split('\n').map(l => l.trim()).filter(l => l).map((line, i) => {
    const parts = line.split('|').map(p => p.trim());
    if (!parts[0] || !/^\d{4}-\d{2}-\d{2}$/.test(parts[0])) return { _error: `줄 ${i+1}: 날짜 형식 오류 (YYYY-MM-DD)`, _raw: line };
    if (!parts[1]) return { _error: `줄 ${i+1}: 금액 없음`, _raw: line };
    const amount = parseInt(parts[1].replace(/,/g, ''));
    if (isNaN(amount) || amount <= 0) return { _error: `줄 ${i+1}: 금액 오류 (양수 정수)`, _raw: line };
    const category_name = parts[2] || null;
    const typeRaw = (parts[3] || '').trim();
    const entry_type = (typeRaw === '수입' || typeRaw === 'income') ? 'income' : 'expense';
    const memo = parts[4] || null;
    return { date: parts[0], amount, category_name, entry_type, memo };
  });
}

function renderBulkPreview(items, columns, previewEl, confirmFn) {
  const valid = items.filter(i => !i._error);
  const errCount = items.length - valid.length;
  let html = `<div class="bulk-count">총 ${items.length}줄 · 유효 <strong>${valid.length}건</strong>${errCount ? ` · 오류 <span style="color:var(--danger)">${errCount}건</span>` : ''}</div>`;
  html += `<table><tr>${columns.map(c=>`<th>${c.label}</th>`).join('')}</tr>`;
  items.forEach(item => {
    if (item._error) {
      html += `<tr class="err-row"><td colspan="${columns.length}">⚠ ${esc(item._error)}</td></tr>`;
    } else {
      html += `<tr>${columns.map(c => `<td>${esc(String(c.fn(item)||''))}</td>`).join('')}</tr>`;
    }
  });
  html += '</table>';
  if (valid.length > 0) {
    html += `<button class="btn btn-primary" style="margin-top:.75rem;width:100%" onclick="${confirmFn}()">✔ ${valid.length}건 등록 확정</button>`;
  }
  previewEl.innerHTML = html;
  previewEl.style.display = '';
}

function previewBulkTodo() {
  const items = parseTodoLines($('bulk-todo-input').value);
  if (!items.length) return;
  const cols = [
    { label: '제목', fn: i => i.title },
    { label: '우선순위', fn: i => i.priority },
    { label: '마감', fn: i => i.due_date || '' },
    { label: '메모', fn: i => i.memo || '' },
  ];
  renderBulkPreview(items, cols, $('bulk-todo-preview'), 'confirmBulkTodo');
}

async function confirmBulkTodo() {
  const items = parseTodoLines($('bulk-todo-input').value).filter(i => !i._error);
  if (!items.length) return;
  const r = await fetch('/api/todos/bulk', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({items}) });
  if (r.ok) {
    const d = await r.json();
    alert(`${d.created}건 등록되었습니다`);
    $('bulk-todo-input').value = '';
    $('bulk-todo-preview').style.display = 'none';
    loadTodos();
  } else {
    alert('등록 실패');
  }
}

function previewBulkBudget() {
  const items = parseBudgetLines($('bulk-budget-input').value);
  if (!items.length) return;
  const cols = [
    { label: '날짜', fn: i => i.date },
    { label: '금액', fn: i => i.amount.toLocaleString('ko-KR') },
    { label: '분류', fn: i => i.category_name || '미분류' },
    { label: '구분', fn: i => i.entry_type === 'income' ? '수입' : '지출' },
    { label: '메모', fn: i => i.memo || '' },
  ];
  renderBulkPreview(items, cols, $('bulk-budget-preview'), 'confirmBulkBudget');
}

async function confirmBulkBudget() {
  const items = parseBudgetLines($('bulk-budget-input').value).filter(i => !i._error);
  if (!items.length) return;
  const r = await fetch('/api/budget/bulk', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({items}) });
  if (r.ok) {
    const d = await r.json();
    alert(`${d.created}건 등록되었습니다`);
    $('bulk-budget-input').value = '';
    $('bulk-budget-preview').style.display = 'none';
    loadBudget();
    loadCategories();
  } else {
    alert('등록 실패');
  }
}
